    <path d="M42 11 C47 15 47 25 42 29" stroke="#CC0000" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
  </g>
  <!-- Wordmark: MY LEADER -->
  <text x="56" y="38" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="900" letter-spacing="-0.5" fill="#CC0000">MY LEADER</text>
